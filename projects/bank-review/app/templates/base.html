<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank Review{% if title %} — {{ title }}{% endif %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script>
    (function() {
      const t = localStorage.getItem('theme') || 'dark';
      document.documentElement.dataset.theme = t;
    })();
  </script>
</head>
<body>
  <header>
    <span class="logo">Bank Review</span>
    <nav class="main-nav">
      <a href="/budget" class="nav-link {% if active == 'budget' %}active{% endif %}">Suivi budget</a>
      <a href="/import" class="nav-link {% if active == 'import' %}active{% endif %}">Importer</a>
    </nav>
    <div class="header-actions">
      <button class="theme-toggle" id="themeToggle" title="Changer le thème" onclick="toggleTheme()">
        <span class="theme-icon-dark">☀</span>
        <span class="theme-icon-light">☾</span>
      </button>
      <a href="/logout" class="logout">Déconnexion</a>
    </div>
  </header>

  {% block content %}{% endblock %}

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
      html.dataset.theme = next;
      localStorage.setItem('theme', next);
    }
  </script>
  <script
    src="/static/feedback-widget.js"
    data-api=""
    data-project="bank-review"
    defer
  ></script>
</body>
</html>
