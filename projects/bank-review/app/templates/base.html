<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank Review{% if title %} — {{ title }}{% endif %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <span class="logo">Bank Review</span>
    <nav class="main-nav">
      <a href="/budget" class="nav-link {% if active == 'budget' %}active{% endif %}">Suivi budget</a>
      <a href="/import" class="nav-link {% if active == 'import' %}active{% endif %}">Importer</a>
      <a href="/upload" class="nav-link {% if active == 'upload' %}active{% endif %}">Visualiser</a>
    </nav>
    <a href="/logout" class="logout">Déconnexion</a>
  </header>

  {% block content %}{% endblock %}
</body>
</html>
