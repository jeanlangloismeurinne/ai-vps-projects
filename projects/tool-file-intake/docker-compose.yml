services:
  tool-file-intake:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8020:8000"
    env_file: .env
    volumes:
      - /storage/Documents:/storage/Documents
      - /data/intake-db:/data/intake-db
    networks:
      - infra-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  infra-net:
    external: true
