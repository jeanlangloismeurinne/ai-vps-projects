# IMPORTANT :
# - Labels Traefik explicites (pas d'auto-injection mode dockercompose)
# - Pas de env_file : Coolify injecte les variables directement
# - Rebuild via /deploy, jamais /restart

services:
  portfolio-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio-backend
    networks:
      - infra-net
    expose:
      - "8050"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.gzip.compress=true"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.http-0-portfolio0tracker000000000-api.entryPoints=http"
      - "traefik.http.routers.http-0-portfolio0tracker000000000-api.middlewares=redirect-to-https"
      - "traefik.http.routers.http-0-portfolio0tracker000000000-api.rule=Host(`portfolio.jlmvpscode.duckdns.org`) && PathPrefix(`/api`)"
      - "traefik.http.routers.http-0-portfolio0tracker000000000-api.service=http-0-portfolio0tracker000000000-api"
      - "traefik.http.routers.https-0-portfolio0tracker000000000-api.entryPoints=https"
      - "traefik.http.routers.https-0-portfolio0tracker000000000-api.middlewares=gzip"
      - "traefik.http.routers.https-0-portfolio0tracker000000000-api.rule=Host(`portfolio.jlmvpscode.duckdns.org`) && PathPrefix(`/api`)"
      - "traefik.http.routers.https-0-portfolio0tracker000000000-api.service=https-0-portfolio0tracker000000000-api"
      - "traefik.http.routers.https-0-portfolio0tracker000000000-api.tls=true"
      - "traefik.http.routers.https-0-portfolio0tracker000000000-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.https-0-portfolio0tracker000000000-api.priority=10"
      - "traefik.http.services.http-0-portfolio0tracker000000000-api.loadbalancer.server.port=8050"
      - "traefik.http.services.https-0-portfolio0tracker000000000-api.loadbalancer.server.port=8050"

  portfolio-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: portfolio-frontend
    networks:
      - infra-net
    expose:
      - "8051"
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=https://portfolio.jlmvpscode.duckdns.org/api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8051"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.gzip.compress=true"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.http-0-portfolio0tracker000000000.entryPoints=http"
      - "traefik.http.routers.http-0-portfolio0tracker000000000.middlewares=redirect-to-https"
      - "traefik.http.routers.http-0-portfolio0tracker000000000.rule=Host(`portfolio.jlmvpscode.duckdns.org`) && PathPrefix(`/`)"
      - "traefik.http.routers.http-0-portfolio0tracker000000000.service=http-0-portfolio0tracker000000000"
      - "traefik.http.routers.https-0-portfolio0tracker000000000.entryPoints=https"
      - "traefik.http.routers.https-0-portfolio0tracker000000000.middlewares=gzip"
      - "traefik.http.routers.https-0-portfolio0tracker000000000.rule=Host(`portfolio.jlmvpscode.duckdns.org`) && PathPrefix(`/`)"
      - "traefik.http.routers.https-0-portfolio0tracker000000000.service=https-0-portfolio0tracker000000000"
      - "traefik.http.routers.https-0-portfolio0tracker000000000.tls=true"
      - "traefik.http.routers.https-0-portfolio0tracker000000000.tls.certresolver=letsencrypt"
      - "traefik.http.services.http-0-portfolio0tracker000000000.loadbalancer.server.port=8051"
      - "traefik.http.services.https-0-portfolio0tracker000000000.loadbalancer.server.port=8051"

networks:
  infra-net:
    external: true
